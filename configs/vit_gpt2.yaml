# ViT-B/16 encoder + GPT2 decoder fine-tuning (Task 2)
# Usage: uv run python main.py finetune --config configs/vit_gpt2.yaml

run_name: vit-gpt2-all
seed: 42
device: cuda
output_dir: outputs

encoder:
  name: vit-base
  pretrained: google/vit-base-patch16-224
  freeze: false
  feature_dim: 768

decoder:
  type: hf_ved          # VisionEncoderDecoderModel
  name: gpt2
  pretrained: openai-community/gpt2

tokenizer:
  type: hf              # uses decoder's own tokenizer
  max_length: 128

attention:
  enabled: false

dataset:
  root: /ghome/group08/VizWiz-Captions/images
  train_ann: annotations/train.json
  val_ann: annotations/val.json
  train_img_dir: train
  val_img_dir: val
  ignore_rejected: true
  ignore_precanned: true
  val_split_ratio: 0.1

training:
  epochs: 5
  batch_size: 4
  lr: 0.00005
  optimizer: adamw
  weight_decay: 0.01
  scheduler: cosine
  grad_clip: 1.0
  mixed_precision: true
  num_workers: 4
  freeze_encoder: false
  freeze_decoder: false
  early_stopping_patience: 3

inference:
  max_length: 128

wandb:
  enabled: false
  project: c5-image-caption

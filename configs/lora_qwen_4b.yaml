# ViT encoder (frozen) + Qwen3.5-4B decoder with LoRA (Task 4)
# Usage: uv run python main.py finetune-lora --config configs/lora_qwen_4b.yaml

run_name: lora-vit-qwen-4b
seed: 42
device: cuda
output_dir: outputs

encoder:
  name: vit-base
  pretrained: google/vit-base-patch16-224
  freeze: true
  feature_dim: 768
  # checkpoint: outputs/vit-gpt2/checkpoints/best   # ← uncomment to use Task 2 fine-tuned ViT
  num_prefix_tokens: 0    # 0 = use all patch tokens

decoder:
  name: qwen3.5-4b
  pretrained: Qwen/Qwen3.5-4B

tokenizer:
  type: hf
  max_length: 128

attention:
  enabled: false

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target: all            # "all" | "linear" | "attention"

dataset:
  root: /data/123-1/users/jchen/VizWiz
  train_ann: annotations/train.json
  val_ann: annotations/val.json
  train_img_dir: train
  val_img_dir: val
  ignore_rejected: true
  ignore_precanned: true
  val_split_ratio: 0.1

training:
  epochs: 5
  batch_size: 2
  lr: 0.0002
  optimizer: adamw
  weight_decay: 0.01
  scheduler: cosine
  grad_clip: 1.0
  mixed_precision: true
  num_workers: 4
  freeze_encoder: true
  freeze_decoder: false
  early_stopping_patience: 3
  gradient_accumulation_steps: 8

inference:
  max_length: 128

wandb:
  enabled: false
  project: c5-image-caption

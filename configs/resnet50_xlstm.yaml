# ResNet-50 + xLSTM (HuggingFace pretrained causal LM)
# Change pretrained model ID below to switch xLSTM variants

seed: 42
device: cuda

encoder:
  name: resnet50
  pretrained: microsoft/resnet-50
  freeze: false
  feature_dim: 2048

decoder:
  type: hf_lm
  name: xlstm
  pretrained: NX-AI/xLSTM-7b      # change to smaller variant as needed
  num_prefix_tokens: 1
  freeze_lm: false

attention:
  enabled: false

tokenizer:
  type: char                       # placeholder; HF LM uses its own tokenizer
  max_length: 100

dataset:
  root: /data/123-1/users/jchen/VizWiz
  train_ann: annotations/train.json
  val_ann: annotations/val.json
  train_img_dir: train
  val_img_dir: val
  ignore_rejected: true
  ignore_precanned: true
  val_split_ratio: 0.1

training:
  epochs: 10
  batch_size: 8                    # smaller batch for large LM
  lr: 0.00005
  optimizer: adamw
  weight_decay: 0.01
  scheduler: cosine
  grad_clip: 1.0
  teacher_forcing_ratio: 1.0
  mixed_precision: true
  num_workers: 4
  early_stopping_patience: 3

inference:
  beam_size: 1
  max_length: 100

wandb:
  enabled: false
  project: c5-image-caption
